<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaTansção</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-straight/css/uicons-regular-straight.css'>
    <link rel="stylesheet" href="../styles/Style.css">
</head>
<body>
     <header class="menu">
        <img src="../img/Logo.png" alt="">
        <nav>
            <a href="../index.html">Dashboard</a>
            <a href="ListaDeTransacao.html" class="itemAtivo">Transações</a>
            <a href="">Categoria</a>
            <a href="">Relatório</a>
            <a href="">Orçamento</a>
        </nav>
    </header>

    <main>
        <div class="NovoBlocoDeTitulo">
            <div>
                <h1>Nova transação</h1>
            </div>
        </div>
        <div class="BlocoFormulario">
            <form action="">
                <div class="blocoInputs">
                    <div>
                        <select name="TipoEntrada" id="TipoEntrada">
                            <option value="R">Receita</option>
                            <option value="D">Despesa</option>
                        </select>
                    </div>
                    <div>
                        <input type="text" name="Descricao" id="Descricao" placeholder="Descrição">
                    </div>
                    <div>
                        <input type="number" name="Valor" id="Valor" placeholder="0,00">
                    </div>
                    <div>
                        <select name="TipoCategoria" id="TipoCategoria">
                            <option value="Educação">Educação</option>
                            <option value="Saude">Saúde</option>
                        </select>
                    </div>
                    <div>
                        <input type="date" name="Data" id="Data">
                    </div>
                    <div class="AcoesFormulario">
                        <button class="BotaoCancelar">Cancelar</button>
                        <button class="BotaoSalvar">Salvar</button>
                    </div>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
