<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet+</title>
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/3.0.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/3.0.0/uicons-solid-straight/css/uicons-solid-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/3.0.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel="stylesheet" href="styles/Style.css">
</head>
<body>
    <header class="menu">
        <img src="../img/icon.png" alt="">
        <nav>
            <a href="index.html" class="itemAtivo">Dashboard</a>
            <a href="pages/Transacoes.html">Transações</a>
            <a href="pages/Categorias.html">Categoria</a>
            <a href="pages/Relatorios.html">Relatório</a>
            <a href="pages/Orcamentos.html">Orçamento</a>
        </nav>
    </header>
    <main>
        <div class="NovoBlocoDeTitulo">
            <div>
                <h1>Dashboard</h1>
                <h4>Março 2026</h4>
            </div>
        </div>
        <div class="ContainerDashboard">
            <div class="InfoValores">
                <div>
                    <h3>Saldo do mês</h3>
                    <h1 id="valorSaldo">R$ 0,00</h1>
                </div>
                <div>
                    <i class="fi fi-sr-wallet"></i>
                </div>
            </div>
           <div class="InfoValores">
                <div>
                    <h3>Receitas</h3>
                    <h1 id="valorReceita">R$ 0,00</h1>
                </div>
                <div>
                    <i class="fi fi-ss-wallet-income"></i>
                </div>
            </div>
            <div class="InfoValores despesa">
                <div>
                    <h3>Despesas</h3>
                    <h1 id="valorDespesa">R$ 0,00</h1>
                </div>
                <div>
                    <i class="fi fi-sr-wallet-arrow"></i>
                </div>
            </div>
        </div>
        <div class="GraficoContainerD">
           <div>
                <div>
                    <h3>Despesas por categoria</h3>
                </div>
           </div>

        </div>
    </main>
    <script src="./script.js"></script>
</body>

</html>
